<body>
<div class="header">
  <h1>Divide-Then-Align (ACL 2025 Main)</h1>
  <p>Honest Alignment based on the Knowledge Boundary of RAG</p>
</div>
<div class="content">
  <div class="left">
    <img src="/Users/sunxin/resume/papers/02_Divide-Then-Align_images/x1.png" style="width: 220pt; height: auto;" />
    <img src="/Users/sunxin/resume/papers/02_Divide-Then-Align_images/x2.png" style="width: 260pt; height: auto; margin-top: 8pt;" />
  </div>
  <div class="right">
    <h2>问题</h2>
    <p>RAG 系统中，检索知识与模型内部知识冲突时应该相信谁？缺乏知识边界感知。</p>
    <div class="method-box">
      <p><b>Divide：</b>利用模型内部表征划分知识象限</p>
      <p><b>Align：</b>已知→信内部 | 未知→信检索 | 不可靠→诚实拒答</p>
    </div>
    <h2>结果</h2>
    <div class="result-box">
      <p>多个 QA 基准上同时提升准确率与校准度</p>
      <p>无需额外判别模型，模型学会说"我不知道"</p>
    </div>
    <div class="venue"><p><b>ACL 2025 Main Conference (CCF-A)</b></p></div>
  </div>
</div>
