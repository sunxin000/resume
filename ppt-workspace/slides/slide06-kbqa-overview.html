<!DOCTYPE html>
<html>
<head>
<style>
html { background: #ffffff; }
body {
  width: 720pt; height: 405pt; margin: 0; padding: 0;
  font-family: Arial, sans-serif; display: flex; flex-direction: column;
  background: #FFFFFF;
}
.header { background: #1A3A5C; padding: 14pt 40pt; }
.header h1 { color: #FFFFFF; font-size: 20pt; margin: 0; }
.content { margin: 6pt 30pt; flex: 1; display: flex; flex-direction: column; align-items: center; }
.content h2 { color: #1A3A5C; font-size: 13pt; margin: 0 0 4pt 0; align-self: flex-start; }
.bar { background: #F0F7FA; padding: 5pt 14pt; border-left: 4pt solid #1A3A5C; margin: 4pt 0; align-self: stretch; }

<body>
<div class="header"><h1>KBQA-R1: 整体框架</h1></div>
<div class="content">
  <h2>Multi-turn Think → Action → Information 循环</h2>
  <img src="/Users/sunxin/resume/papers/01_KBQA-R1_images/x1.png" style="width: 420pt; height: auto;" />
  <div class="bar">
    <p><b>核心流程：</b>给定问题 → LLM 推理（Think）→ 选择原子动作（Action）→ 知识库返回结果（Information）→ 循环直至输出最终答案</p>
    <p><b>RRCG 模块：</b>每步验证 LLM 提出的关系是否在 KB schema 中存在，防止幻觉</p>
  </div>
</div>
