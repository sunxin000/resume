<!DOCTYPE html>
<html>
<head>
<style>
html { background: #ffffff; }
body {
  width: 720pt; height: 405pt; margin: 0; padding: 0;
  font-family: Arial, sans-serif; display: flex; flex-direction: column;
  background: #FFFFFF;
}
.header { background: #1A3A5C; padding: 18pt 40pt; }
.header h1 { color: #FFFFFF; font-size: 22pt; margin: 0; }
.content { margin: 14pt 36pt; flex: 1; display: flex; flex-direction: row; }
.left { flex: 1; margin-right: 14pt; display: flex; flex-direction: column; align-items: center; justify-content: center; }
.right { flex: 1; }
.right h2 { color: #1A3A5C; font-size: 14pt; margin: 0 0 8pt 0; }
.right ul { margin: 0; padding: 0 0 0 14pt; }
.right li { color: #333333; font-size: 10pt; margin: 5pt 0; line-height: 1.4; }
.significance {
  background: #E8F5E9; padding: 10pt; border-left: 4pt solid #2E7D32; margin: 10pt 0;
}
.significance p { color: #333333; font-size: 10pt; margin: 3pt 0; }
.venue { background: #1A3A5C; padding: 8pt 12pt; margin: 10pt 0; text-align: center; }
.venue p { color: #FFFFFF; font-size: 11pt; margin: 0; }
</style>
</head>
<body>
<div class="header"><h1>Divide-Then-Align: 实验结果</h1></div>
<div class="content">
  <div class="left">
    <img src="images/dta-x3.png" style="width: 280pt; height: auto;" />
  </div>
  <div class="right">
    <h2>主要贡献</h2>
    <ul>
      <li>首次提出基于知识边界的 RAG 诚实对齐</li>
      <li>利用内部表征自动识别知识边界</li>
      <li>多个 QA 基准上同时提升准确率与校准度</li>
      <li>模型学会在不确定时诚实拒答</li>
    </ul>
    <div class="significance">
      <p><b>可直接应用于任何 RAG 系统的可信性提升</b></p>
    </div>
    <div class="venue"><p><b>ACL 2025 Main Conference (CCF-A)</b></p></div>
  </div>
</div>
</body>
</html>
