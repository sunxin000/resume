<!DOCTYPE html>
<html>
<head>
<style>
html { background: #ffffff; }
body {
  width: 720pt; height: 405pt; margin: 0; padding: 0;

}

.job-content { flex: 1; }
.job-content h2 { color: #1A3A5C; font-size: 15pt; margin: 0 0 4pt 0; }
.job-content h3 { color: #666666; font-size: 11pt; margin: 0 0 8pt 0; font-weight: normal; }
.job-content ul { margin: 0; padding: 0 0 0 14pt; }
.job-content li { color: #333333; font-size: 10pt; margin: 4pt 0; line-height: 1.4; }
.divider { height: 1pt; background: #E0E0E0; margin: 14pt 0; }

</head>
<body>
<div class="header"><h1>实习经历</h1></div>
<div class="content">

    <div class="timeline"></div>

      <h2>蚂蚁集团 — 机器智能部门</h2>

  </div>
  <div class="divider"></div>
  <div class="job">

    <div class="job-content">
      <h2>字节跳动 — AML</h2>
